<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z&lt;VISION&gt;RAUM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0ede6;
    --ink: #111;
    --gelb: #e6a800;
    --gruen: #3a9a3a;
    --rot: #d63025;
    --blau: #3a6abf;
    --orange: #e07020;
    --mono: 'Space Mono', monospace;
    --serif: 'Instrument Serif', serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 28px 36px 0;
    pointer-events: none;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-decoration: none;
    color: var(--ink);
    pointer-events: all;
    user-select: none;
  }
  .logo .v { color: var(--gelb); }
  .logo .tag { font-weight: 400; opacity: 0.5; font-size: 0.85em; }

  nav {
    text-align: right;
    pointer-events: all;
    font-size: 0.78rem;
    line-height: 1.9;
  }
  nav .tag { opacity: 0.4; display: block; }
  nav a {
    display: block;
    color: var(--ink);
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  nav a:hover { opacity: 1; }

  /* ── MAIN STAGE ── */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }



  /* ── INTRO TEXT ── */
  .intro {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-family: var(--mono);
    font-size: 0.78rem;
    line-height: 2;
    opacity: 0;
    animation: fadeIn 0.6s 1.3s forwards;
    white-space: nowrap;
    pointer-events: none;
  }
  .intro .tag { opacity: 0.4; display: block; font-size: 0.65rem; }
  .intro strong { font-style: italic; }
  .intro em {
    font-style: normal;
    background: linear-gradient(90deg,var(--gelb),var(--gruen),var(--orange),var(--rot),var(--blau));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
  }


  /* backdrop (subtle) */
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 150;
    display: none;
  }
  .backdrop.active { display: block; }

  /* Footer */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.6rem;
    opacity: 0.35;
    padding: 10px;
    pointer-events: none;
  }
  footer .tag { opacity: 0.6; }
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#" onclick="closePopup()">
    Z<span class="tag">&lt;</span><span class="v">VISION</span><span class="tag">&gt;</span>RAUM<span class="tag">&lt;/VISION&gt;</span>
  </a>
  <nav>
    <span class="tag">&lt;menu&gt;</span>
    <a href="#">über uns</a>
    <a href="#">kontakt</a>
    <a href="#">impressum</a>
    <span class="tag">&lt;/menu&gt;</span>
  </nav>
</header>

<!-- BACKDROP -->
<div class="backdrop" id="backdrop" onclick="closePopup()"></div>


<!-- MAIN STAGE -->
<main class="stage">
  <div class="diagram-wrap">

  

    <!-- INTRO -->
    <div class="intro">
      <span class="tag">&lt;p class="intro"&gt;</span>
      klick auf deine <em>lieblingsfarbe</em><br>
      und tritt ein in den zwischenraum.
      <span class="tag">&lt;/p&gt;</span>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer>
  <span class="tag">&lt;footer&gt;</span><br>
  ZVISIONRAUM © 2026 – ein ort zwischen laut und leise<br>
  <span class="tag">&lt;/footer&gt;</span>
</footer>

</body>
</html>
