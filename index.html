<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nogma.xyz</title>
  <link rel="icon" href="Untitled-1.png">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Noto+Serif+Vietnamese&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #ff8c42;
      --pink: #ff6eb4;
      --peach: #ffb347;
      --rose: #ffaec0;
      --lavender: #e8d5f5;
      --bg: #fff5f8;
      --text: #3a2030;
      --muted: #b07090;
      --card: rgba(255,255,255,0.55);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 20px;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* DREAMY BACKGROUND */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* FLOATING ORBS — dreamy cloud/water atmosphere */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.38;
      animation: drift var(--dur, 18s) ease-in-out infinite alternate;
    }
    .orb1 { width: 600px; height: 500px; background: radial-gradient(circle, #ffcce0, #ffb0d0); top: -100px; left: -150px; --dur: 22s; }
    .orb2 { width: 500px; height: 450px; background: radial-gradient(circle, #ffd4a0, #ffb347); top: 100px; right: -100px; --dur: 18s; animation-direction: alternate-reverse; }
    .orb3 { width: 400px; height: 350px; background: radial-gradient(circle, #ffe0f0, #ffaec0); bottom: 50px; left: 10%; --dur: 24s; }
    .orb4 { width: 350px; height: 300px; background: radial-gradient(circle, #ffecd2, #ffcba4); bottom: -50px; right: 15%; --dur: 20s; animation-direction: alternate-reverse; }
    .orb5 { width: 250px; height: 200px; background: radial-gradient(circle, #e8d5f5, #d4a8e8); top: 40%; left: 40%; --dur: 16s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 40px) scale(1.08); }
    }

    /* FLOATING PARTICLES */
    .particle {
      position: absolute;
      font-size: 13px;
      color: var(--pink);
      opacity: 0;
      animation: floatUp var(--d, 8s) ease-in infinite;
      animation-delay: var(--delay, 0s);
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      20%  { opacity: 0.6; }
      80%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-120px) rotate(20deg); }
    }

    /* MARQUEE */
    .marquee-top {
      background: linear-gradient(90deg, var(--orange), var(--pink), var(--peach), var(--pink), var(--orange));
      background-size: 200% 100%;
      animation: gradShift 6s linear infinite;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 7px 0;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }
    @keyframes gradShift { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    .marquee-top span {
      display: inline-block;
      animation: marquee 20s linear infinite;
    }
    @keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

    /* WRAPPER */
    .wrapper {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 20px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 36px 0 24px;
    }

    .viet-top {
      font-family: 'Noto Serif Vietnamese', serif;
      color: var(--orange);
      font-size: 13px;
      letter-spacing: 5px;
      margin-bottom: 10px;
      opacity: 0.75;
    }

    .site-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(22px, 5vw, 40px);
      background: linear-gradient(135deg, var(--orange), var(--pink), var(--peach));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 12px rgba(255,110,180,0.35));
      margin-bottom: 12px;
      animation: titlePulse 4s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 2px 12px rgba(255,110,180,0.35)); }
      50%       { filter: drop-shadow(0 2px 24px rgba(255,140,66,0.5)); }
    }

    .site-sub {
      font-size: 22px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .viet-sub {
      font-family: 'Noto Serif Vietnamese', serif;
      color: var(--rose);
      font-size: 12px;
      letter-spacing: 3px;
      opacity: 0.7;
    }

    /* FLOWER DECO */
    .flower-deco {
      font-size: 28px;
      margin: 10px 0;
      animation: spin 10s linear infinite;
      display: inline-block;
      filter: drop-shadow(0 0 8px rgba(255,110,180,0.6));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DIVIDER */
    .divider {
      text-align: center;
      color: var(--orange);
      font-size: 18px;
      margin: 12px 0;
      letter-spacing: 6px;
      opacity: 0.6;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }
    nav a {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      padding: 10px 16px;
      text-decoration: none;
      border-radius: 999px;
      box-shadow: 0 4px 15px rgba(255,110,180,0.3);
      transition: all 0.25s;
      backdrop-filter: blur(4px);
    }
    nav a:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(255,110,180,0.45);
      background: linear-gradient(135deg, var(--pink), var(--peach));
    }

    /* MAIN GRID */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 265px;
      gap: 22px;
      margin-top: 22px;
    }

    /* CARDS — organic, glassy */
    .box {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,180,180,0.35);
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(255,110,180,0.12), 0 2px 8px rgba(255,140,66,0.08);
      margin-bottom: 20px;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .box:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(255,110,180,0.2), 0 4px 12px rgba(255,140,66,0.1);
    }

    .box-title {
      background: linear-gradient(135deg, rgba(255,140,66,0.15), rgba(255,110,180,0.15));
      color: var(--orange);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255,180,180,0.2);
      letter-spacing: 0.05em;
    }
    .box-body { padding: 18px; }

    /* POSTS */
    .post {
      border-bottom: 1px dashed rgba(255,140,66,0.2);
      padding-bottom: 18px;
      margin-bottom: 18px;
    }
    .post:last-child { border-bottom: none; margin-bottom: 0; }

    .post-date {
      color: var(--orange);
      font-size: 16px;
      margin-bottom: 4px;
      opacity: 0.8;
    }
    .post-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1.9;
      text-decoration: none;
      display: block;
      transition: opacity 0.2s;
    }
    .post-title:hover { opacity: 0.7; }

    .post-excerpt {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .post-viet {
      font-family: 'Noto Serif Vietnamese', serif;
      color: var(--rose);
      font-size: 12px;
      font-style: italic;
      opacity: 0.7;
    }
    .post-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(255,140,66,0.15), rgba(255,110,180,0.15));
      color: var(--pink);
      border: 1px solid rgba(255,110,180,0.3);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 4px 10px;
      margin-right: 5px;
      margin-top: 8px;
      border-radius: 999px;
    }

    /* ABOUT */
    .about-magic {
      text-align: center;
      font-size: 42px;
      padding: 10px 0 6px;
      line-height: 1.2;
      animation: magicFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 14px rgba(255,110,180,0.5));
    }
    @keyframes magicFloat {
      0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 14px rgba(255,110,180,0.5)); }
      50%       { transform: translateY(-6px) scale(1.05); filter: drop-shadow(0 0 22px rgba(255,140,66,0.7)); }
    }

    .about-text {
      font-size: 18px;
      line-height: 1.65;
      color: var(--muted);
      text-align: center;
    }
    .about-viet {
      font-family: 'Noto Serif Vietnamese', serif;
      color: var(--orange);
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      opacity: 0.65;
    }
    .kaomoji-row {
      text-align: center;
      font-size: 14px;
      margin: 10px 0 4px;
      color: var(--pink);
      letter-spacing: 8px;
      opacity: 0.7;
    }

    /* STATUS */
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      box-shadow: 0 0 8px rgba(255,110,180,0.6);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

    /* COUNTER */
    .counter { text-align: center; padding: 10px; }
    .counter-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .counter-num {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 5px;
    }

    /* LINKS */
    .links-list { list-style: none; }
    .links-list li { margin-bottom: 10px; }
    .links-list a {
      color: var(--orange);
      text-decoration: none;
      font-size: 18px;
      transition: color 0.2s;
    }
    .links-list a::before { content: '(¬‿¬) '; color: var(--pink); font-size: 14px; }
    .links-list a:hover { color: var(--pink); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px 20px;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }
    .footer-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      margin-bottom: 24px;
      opacity: 0.4;
    }
    .footer-viet {
      font-family: 'Noto Serif Vietnamese', serif;
      color: var(--orange);
      font-size: 15px;
      margin-bottom: 8px;
      opacity: 0.65;
    }
    .footer-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--rose);
      line-height: 2.2;
      opacity: 0.6;
    }
    .footer-badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .badge {
      background: linear-gradient(135deg, rgba(255,140,66,0.1), rgba(255,110,180,0.1));
      border: 1px solid rgba(255,110,180,0.25);
      color: var(--pink);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 5px 12px;
      border-radius: 999px;
    }

    @media (max-width: 650px) {
      .main-grid { grid-template-columns: 1fr; }
      .site-title { font-size: 20px; }
    }
  </style>
</head>
<body>
    <!-- DREAMY BG -->
  <div class="bg-canvas">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>
    <div class="orb orb5"></div>
  </div>

  <!-- MARQUEE -->
  <div class="marquee-top">
    <span>✿ hello, we are online! ✿ hello, we are online! ✿ hello, we are online! ✿ hello, we are online! ✿</span>
  </div>
  
  <h1>...</h1>
    
  <footer>
    <p>© 2026 nogma.xyz — funfunfun</p>
  </footer>
</body>
</html>
