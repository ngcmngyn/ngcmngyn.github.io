<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z&lt;VISION&gt;RAUM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&family=Gravitas+One&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0ede6;
    --ink: #111;
    --gelb: #e6a800;
    --gruen: #3a9a3a;
    --rot: #d63025;
    --blau: #3a6abf;
    --orange: #e07020;
    --mono: 'Space Mono', monospace;
    --serif: 'Instrument Serif', serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    overflow: hidden;
    cursor: crosshair;
  }
  a, button, .option, .size-option {
    cursor: auto;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 28px 36px 0;
    pointer-events: none;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 0.18rem;
    text-decoration: none;
    color: var(--ink);
    pointer-events: all;
    user-select: none;
  }
  .logo .title-main {
    font-family: 'Gravitas One', cursive;
    font-size: 1.8rem;
    line-height: 1;
    color: #111;
  }
  .logo .title-vision {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    line-height: 1;
    letter-spacing: 0.08em;
    color: #111;
  }
  .logo .tag {
    font-family: var(--mono);
    font-size: 1.25rem;
    line-height: 1;
    opacity: 0.35;
  }
  .logo .tag.close {
    font-size: 0.65rem;
    opacity: 0.35;
    align-self: flex-end;
  }
  .logo .v { display: inline-flex; gap: 0.05em; }
  .col-gruen  { color: var(--gruen); }
  .col-gelb   { color: var(--gelb); }
  .col-rot    { color: var(--rot); }
  .col-blau   { color: var(--blau); }
  .col-orange { color: var(--orange); }

  nav {
    text-align: left;
    pointer-events: all;
    font-size: 0.78rem;
    line-height: 1.9;
    width: max-content;
  }
  nav .tag { opacity: 0.4; display: block; }
  nav a {
    display: block;
    color: var(--ink);
    text-decoration: none;
    opacity: 0.7;
    padding-left: 10px;
    transition: opacity 0.2s;
  }
  /* Menu tags slightly left */
  nav a:nth-child(1),
  nav a:nth-child(5) {
    padding-left: 0;
  }
  /* Links (über uns, kontakt, impressum) slightly right */
  nav a:nth-child(2),
  nav a:nth-child(3),
  nav a:nth-child(4) {
    padding-left: 20px;
  }
  nav a:hover { opacity: 1; }

  .page-content {
    position: relative;
    padding-top: 180px;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.88rem;
    color: var(--ink);
  }
  .page-content a {
    color: var(--ink);
    text-decoration: underline;
    opacity: 0.9;
    pointer-events: all;
  }

  /* Canvas drawing integration */
  #container {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
  }

  .paint-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    background: transparent;
    display: block;
    pointer-events: none;
    z-index: 150;
  }

  /* toolbar */
  #options {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    border: 1.5px solid #111;
    border-radius: 999px;
    padding: 8px 14px;
    box-shadow: 4px 4px 0 #111;
    z-index: 300;
    user-select: none;
    pointer-events: all;
  }

  .sep { width: 1px; height: 24px; background: #ddd; margin: 0 4px; flex-shrink: 0; }
  .option { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; display:flex; align-items:center; justify-content:center }
  .option:hover { transform: scale(1.18); }
  .option.active { border-color: #111; transform: scale(1.18); }
  #yellow { background: #e6a800 } #orange { background: #e07020 } #red { background: #d63025 } #blue { background: #3a6abf } #green { background: #3a9a3a } #black { background: #111 } #white { background: #fff; border:2px solid #ccc }
  .size-option { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer }
  .circle { border-radius:50%; background:#111; pointer-events:none }
  #circle1{width:4px;height:4px} #circle2{width:9px;height:9px} #circle3{width:16px;height:16px}
  #clear-btn{height:30px;padding:0 12px;border-radius:999px;border:1.5px solid #111;background:transparent;font-family:monospace;font-size:11px;cursor:pointer}
  #cursor-ring{position:fixed;pointer-events:none;border-radius:50%;border:1.5px solid rgba(0,0,0,0.4);transform:translate(-50%,-50%);transition:width 0.1s,height 0.1s;z-index:999;display:block}

  /* Footer */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.6rem;
    opacity: 0.35;
    padding: 10px;
    pointer-events: none;
  }
  footer .tag { opacity: 0.6; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="index.html">
    <span class="title-main"><span class="title-z">Z</span></span>
    <span class="tag">&lt;</span>
    <span class="title-vision"><span class="col-gruen">V</span><span class="col-gelb">I</span><span class="col-rot">S</span><span class="col-blau">I</span><span class="col-orange">O</span><span class="col-gruen">N</span></span>
    <span class="tag">&gt;</span>
    <span class="title-main"><span class="title-raum">RAUM</span></span>
    <span class="tag close">&lt;/vision&gt;</span>
  </a>
  <nav>
    <a href="index.html"><span class="tag">&lt;menu&gt;</span></a>
    <a href="ueber-uns.html">über uns</a>
    <a href="kontakt.html">kontakt</a>
    <a href="impressum.html">impressum</a>
    <a href="index.html"><span class="tag">&lt;/menu&gt;</span></a>
  </nav>
</header>

<!-- Canvas container + toolbar (integrated) -->
<div id="container">
  <canvas class="paint-canvas js-paint"></canvas>
</div>

<div id="cursor-ring"></div>

<div id="options">
  <div id="yellow" class="option active" title="Gelb"></div>
  <div id="orange" class="option" title="Orange"></div>
  <div id="red" class="option" title="Rot"></div>
  <div id="blue" class="option" title="Blau"></div>
  <div id="green" class="option" title="Grün"></div>
  <div id="black" class="option" title="Schwarz"></div>
  <div id="white" class="option" title="Weiß / Übermalen"></div>

  <div class="sep"></div>

  <div id="thin" class="size-option" title="Dünn"><div id="circle1" class="circle"></div></div>
  <div id="normal" class="size-option active" title="Normal"><div id="circle2" class="circle"></div></div>
  <div id="thick" class="size-option" title="Dick"><div id="circle3" class="circle"></div></div>

  <div class="sep"></div>

  <button id="clear-btn" title="Alles löschen">CLEAR</button>
</div>

<main class="page-content">
  <p>baubaubaustelle</p>
</main>

<!-- FOOTER -->
<footer>
  <span class="tag">&lt;footer&gt;</span><br>
    ZVISIONRAUM © 2026 – ein ort zwischen laut und leise<br>
  <span class="tag">&lt;/footer&gt;</span>
</footer>

<script>
  (function(){
    const canvas = document.querySelector('.js-paint');
    const ctx = canvas.getContext('2d');
    const ring = document.getElementById('cursor-ring');
    const drawToggle = document.getElementById('draw-toggle');

    let currentColor = '#e6a800';
    let currentSize = 8;
    let isErasing = false;
    let isDrawing = false;
    let lastX = 0, lastY = 0;

    function initCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = currentSize;
    }
    function resize(){
      const img = canvas.toDataURL();
      initCanvas();
      const image = new Image();
      image.onload = () => ctx.drawImage(image,0,0);
      image.src = img;
    }
    initCanvas();
    window.addEventListener('resize', resize);

    const colorMap = { yellow:'#e6a800', orange:'#e07020', red:'#d63025', blue:'#3a6abf', green:'#3a9a3a', black:'#111111', white:'#f0ede6' };
    document.querySelectorAll('.option').forEach(el=> el.addEventListener('click', ()=>{
      document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
      currentColor = colorMap[el.id];
      ctx.strokeStyle = currentColor;
      ctx.globalCompositeOperation = 'source-over';
        updateRing();
    }));

    const sizeMap = { thin:3, normal:8, thick:22 };
    document.querySelectorAll('.size-option').forEach(el=> el.addEventListener('click', ()=>{
      document.querySelectorAll('.size-option').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
      currentSize = sizeMap[el.id]; ctx.lineWidth = currentSize; updateRing();
    }));

    document.getElementById('clear-btn').addEventListener('click', ()=> ctx.clearRect(0,0,canvas.width,canvas.height));

    function updateRing(){ const d = currentSize + 6; ring.style.width = d+'px'; ring.style.height = d+'px'; ring.style.borderColor = isErasing ? 'rgba(0,0,0,0.3)' : currentColor + 'bb'; }
    updateRing();

    document.addEventListener('mousemove', e=>{
      const target = e.target;
      const ignore = target.closest('a, button, .option, .size-option, #clear-btn');
      ring.style.display = ignore ? 'none' : 'block';
      ring.style.left = e.clientX+'px';
      ring.style.top = e.clientY+'px';
    });
    document.addEventListener('mouseleave', ()=>{ ring.style.display='none'; });

    function getPos(e){ if(e.touches){ const t = e.touches[0]; const r = canvas.getBoundingClientRect(); return { x: t.clientX - r.left, y: t.clientY - r.top }; } const rect = canvas.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }

    function shouldIgnoreDrawing(target){ return !!target.closest('a, button, .option, .size-option, #clear-btn'); }

    function startDraw(e){ if(shouldIgnoreDrawing(e.target)) return; isDrawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; ctx.beginPath(); if(isErasing){ const prev = ctx.globalCompositeOperation; ctx.globalCompositeOperation='destination-out'; ctx.arc(lastX,lastY,ctx.lineWidth/2,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,1)'; ctx.fill(); ctx.globalCompositeOperation = prev; } else { ctx.arc(lastX,lastY,ctx.lineWidth/2,0,Math.PI*2); ctx.fillStyle = currentColor; ctx.fill(); } }

    function draw(e){ if(!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke(); lastX = p.x; lastY = p.y; }
    function stopDraw(){ isDrawing = false; }

    document.addEventListener('mousedown', startDraw);
    document.addEventListener('mousemove', draw);
    document.addEventListener('mouseup', stopDraw);
    document.addEventListener('mouseleave', stopDraw);
    document.addEventListener('touchstart', e=>{ if(shouldIgnoreDrawing(e.target)) return; e.preventDefault(); startDraw(e); }, { passive:false });
    document.addEventListener('touchmove', e=>{ if(!isDrawing) return; e.preventDefault(); draw(e); }, { passive:false });
    document.addEventListener('touchend', stopDraw);

    // drawing always active on open
    document.getElementById('container').style.pointerEvents = 'none';
  })();
</script>
</body>
</html>
